[package]
name = "omni-relayer"
version = "0.3.7"
edition = "2021"
resolver = "2"
repository = "https://github.com/Near-One/omni-bridge"

[dependencies]
log = "0.4"
pretty_env_logger = "0.5"
chrono = "0.4"

anyhow = "1"
futures = "0.3.5"

clap = { version = "4.5", features = ["derive"] }
dotenv = "0.15"
toml = "0.8.19"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
borsh = "1.5.1"
bson = "2.13.0"

tokio = { version = "1", features = ["sync", "time", "macros", "rt-multi-thread"] }
tokio-stream = { version = "0.1" }

solana-sdk = "2.1.9"
solana-client = "2.1.9"
solana-transaction-status = "2.1.9"
solana-rpc-client-api = "2.1.9"

ethereum-types = "0.14.1"
omni-types = { git = "https://github.com/near-one/omni-bridge", package = "omni-types", rev = "06b273b9986abf42e0e9a52ca279c6c3a941c405" }
# Comment out `bridge-indexer-types` if you don't have an access to the repo and want to use regular indexers
bridge-indexer-types = { git = "ssh://git@github.com/near-one/bridge-indexer-rs.git", package = "bridge-indexer-types", rev = "f437be2981bda8aa50e568a8d1689d3faf1c3d37" }

near-lake-framework = "0.7.11"
near-jsonrpc-client = "0.15.1"
near-jsonrpc-primitives = "0.28.0"
near-primitives = "0.28.0"
near-crypto = "0.28.0"
near-sdk = "5.8.0"

hex = "0.4.3"
alloy = { version = "0.9", features = ["node-bindings", "providers", "rpc-types", "sol-types", "provider-ws", "signers", "signer-local"] }

mongodb = "3.2.1"
redis = { version = "0.29.1", features = ["aio", "tokio-comp"] }
reqwest = "0.12"

eth-proof = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "eth-proof" }

bridge-connector-common = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "bridge-connector-common", rev = "e0e55184e2e69b116c5646551eceb7831185d4c7" }
near-rpc-client = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "near-rpc-client", rev = "e0e55184e2e69b116c5646551eceb7831185d4c7" }

near-bridge-client = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "near-bridge-client", rev = "e0e55184e2e69b116c5646551eceb7831185d4c7" }
evm-bridge-client = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "evm-bridge-client", rev = "e0e55184e2e69b116c5646551eceb7831185d4c7" }
solana-bridge-client = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "solana-bridge-client", rev = "e0e55184e2e69b116c5646551eceb7831185d4c7" }
wormhole-bridge-client = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "wormhole-bridge-client", rev = "e0e55184e2e69b116c5646551eceb7831185d4c7" }

omni-connector = { git = "https://github.com/Near-One/bridge-sdk-rs", package = "omni-connector", rev = "e0e55184e2e69b116c5646551eceb7831185d4c7" }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
